<!DOCTYPE html>
<html>
<head>
<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','{{ client.gtm_id }}');
</script>
<title>{{ client.business_name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/tracking.js"></script>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ client.gtm_id }}"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header class="hero">
<h1>{{ client.business_name }}</h1>
<p>Fast bail bond help when timing matters.</p>
<div class="actions">
<a class="btn primary" href="tel:{{ client.phone_raw }}" onclick="trackDOE('phone_call_click')">Call {{ client.phone }}</a>
<a class="btn" href="sms:{{ client.phone_raw }}" onclick="trackDOE('text_message_click')">Text Now</a>
<a class="btn" href="mailto:{{ client.email }}" onclick="trackDOE('email_click')">Email</a>
<a class="btn" target="_blank" href="https://www.google.com/maps/search/?api=1&query=Jiggaman+Bonding" onclick="trackDOE('maps_click')">Google Maps</a>
</div>
</header>

<section class="card">
<h2>Bail Help Form</h2>
<form action="/lead" method="POST" onsubmit="trackDOE('bail_form_submit')">
<input name="lead_name" placeholder="Your Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" placeholder="Email">
<input name="city" placeholder="City">
<input name="jail" placeholder="Jail">
<input name="bond_amount" placeholder="Bond Amount">
<input name="lead_source" value="Website Bail Form" hidden>
<textarea name="notes" placeholder="What happened?"></textarea>
<button type="submit">Request Bail Help</button>
</form>
</section>

<section class="card">
<h2>AI Intake</h2>
<form action="/lead" method="POST" onsubmit="trackDOE('ai_intake_submit')">
<input name="lead_name" placeholder="Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="city" placeholder="City">
<input name="lead_source" value="AI Intake" hidden>
<button type="submit">Start AI Intake</button>
</form>
</section>

<section class="card">
<h2>Quick Actions</h2>
<a class="link-btn" href="#" onclick="trackDOE('jail_search_click')">Jail Search</a>
<a class="link-btn" href="#" onclick="trackDOE('review_click')">Leave a Review</a>
<a class="link-btn" href="#" onclick="trackDOE('live_chat_click')">Live Chat</a>
</section>

<footer><a href="/login">Agency Login</a></footer>
</body>
</html>
